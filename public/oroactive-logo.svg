<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">OroActive Compro Oro</title>
  <desc id="desc">Logo OroActive con bordo arancione, stella centrale e sfondo trasparente fuori dal cerchio.</desc>
  <defs>
    <path id="top-arc" d="M 225 424 A 354 354 0 0 1 855 424"/>
    <path id="bottom-arc" d="M 300 780 A 292 292 0 0 0 780 780"/>
    <filter id="letter-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="12" dy="10" stdDeviation="0" flood-color="#111111" flood-opacity="1"/>
    </filter>
  </defs>

  <circle cx="540" cy="540" r="405" fill="#050505" stroke="#ff751c" stroke-width="26"/>

  <text
    fill="#ff751c"
    filter="url(#letter-shadow)"
    font-family="Arial Black, Impact, system-ui, sans-serif"
    font-size="116"
    font-weight="900"
    letter-spacing="2"
    paint-order="stroke fill"
    stroke="#ffffff"
    stroke-linejoin="round"
    stroke-width="15"
    text-anchor="middle"
  >
    <textPath href="#top-arc" startOffset="50%">OROACTIVE</textPath>
  </text>

  <path
    d="M540 353 589 505 749 505 619 598 669 751 540 656 411 751 461 598 331 505 491 505Z"
    fill="#ff751c"
    paint-order="stroke fill"
    stroke="#ffffff"
    stroke-linejoin="miter"
    stroke-width="12"
  />

  <text
    fill="#ff751c"
    filter="url(#letter-shadow)"
    font-family="Arial Black, Impact, system-ui, sans-serif"
    font-size="72"
    font-weight="900"
    letter-spacing="0"
    paint-order="stroke fill"
    stroke="#ffffff"
    stroke-linejoin="round"
    stroke-width="11"
    text-anchor="middle"
  >
    <textPath href="#bottom-arc" startOffset="50%">COMPROORO</textPath>
  </text>
</svg>
